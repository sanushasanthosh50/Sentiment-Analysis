
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Sentiment Analysis System</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#667eea,#764ba2);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    width:700px;
    max-width:90%;
    padding:35px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#333;
    margin-bottom:10px;
}

.subtitle{
    color:#666;
    margin-bottom:25px;
}

textarea{
    width:90%;
    height:150px;
    padding:15px;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:16px;
    resize:none;
}

textarea:focus{
    outline:none;
    border-color:#667eea;
}

button{
    margin-top:20px;
    padding:12px 30px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#5568d8;
}

.result{
    margin-top:25px;
    font-size:28px;
    font-weight:bold;
    color:#333;
}

.confidence{
    margin-top:10px;
    font-size:18px;
    color:#555;
}

.footer{
    margin-top:25px;
    color:#777;
    font-size:14px;
}

</style>

</head>

<body>

<div class="container">

    <h1>🤖 AI Sentiment Analysis System</h1>

    <p class="subtitle">
        Enter a review and let AI determine its sentiment.
    </p>

    <form method="POST">

        <textarea
        name="review"
        placeholder="Type your review here..."></textarea>

        <br>

        <button type="submit">
            Analyze Sentiment
        </button>

    </form>

    {% if prediction %}

    <div class="result">
        {{ prediction }}
    </div>

    <div class="confidence">
        Confidence: {{ confidence }}
    </div>

    {% endif %}

    <div class="footer">
        Machine Learning Project using Flask & Scikit-Learn
    </div>

</div>

</body>
</html>
